# ADscan container Unbound base configuration
#
# This replaces Debian's default Unbound config inside the FULL runtime image.
#
# Why:
# - In Docker mode we start Unbound without systemd and without Debian's helper
#   scripts (`unbound-helper chroot_setup`, `root_trust_anchor_update`).
# - Debian's default config enables chroot and DNSSEC trust-anchor management
#   (root.key). In minimal container environments this can cause Unbound to fail
#   to start, which then breaks DNS (including telemetry).
#
# This config is intentionally container-friendly:
# - No chroot.
# - No DNSSEC validation (module-config iterator only) to avoid root.key
#   bootstrapping issues. ADscan only needs reliable resolution, not validation.
# - ADscan writes its dynamic forward zones to `/etc/unbound/unbound.conf.d/10-adscan.conf`.

server:
  # Container-friendly defaults
  chroot: ""
  username: ""
  do-ip6: no

  # Disable DNSSEC validation to prevent SERVFAIL/anchor issues in lab networks
  # and in minimal images. We rely on upstream resolvers for correctness.
  module-config: "iterator"

# Load only ADscan-managed snippets.
#
# IMPORTANT:
# Do NOT glob-include all `/etc/unbound/unbound.conf.d/*.conf`, because Debian's
# Unbound package can ship additional snippets (including DNSSEC trust-anchor
# management) which reintroduce `/var/lib/unbound/root.key` requirements and can
# cause Unbound to fail to start in containers.
include: "/etc/unbound/unbound.conf.d/00-adscan-control.conf"
include: "/etc/unbound/unbound.conf.d/10-adscan.conf"
