# ADscan Unbound remote-control configuration (container runtime)
# Allows ADscan (running as an unprivileged user) to reload Unbound after
# updating `/etc/unbound/unbound.conf.d/10-adscan.conf`.
#
# Security note: This is limited to localhost inside the container.

remote-control:
  control-enable: yes
  # ADscan binds Unbound to a free loopback IP within 127.0.0.0/8 when running
  # with `--network host` (to avoid conflicts with host DNS daemons already
  # bound to 127.0.0.1:53). Allow `unbound-control` to connect on any of the
  # candidate loopback IPs.
  control-interface: 127.0.0.1
  control-interface: 127.0.0.2
  control-interface: 127.0.0.3
  control-interface: 127.0.0.4
  control-interface: 127.0.0.5
  control-port: 8953
  control-use-cert: no
